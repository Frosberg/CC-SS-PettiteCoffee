name: Backend Tests

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
    # 1️⃣ Clonar el código del repositorio
    - name: Checkout código
      uses: actions/checkout@v4

    # 2️⃣ Configurar entorno Java 17 (Temurin) con cache de Maven
    - name: Configurar JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: maven

    # 3️⃣ Dar permisos al script mvnw (necesario en Linux)
    - name: Dar permisos a mvnw
      run: chmod +x backend/mvnw

    # 4️⃣ Ejecutar las pruebas del backend
    - name: Ejecutar tests con Maven (JUnit + Spring Boot)
      run: |
        cd backend
        ./mvnw clean test -B -e
      # -B: modo batch (sin interacción)
      # -e: muestra los errores detallados (útil para depurar)

    # 5️⃣ Publicar resultados de tests (aunque haya fallos)
    - name: Publicar resultados de tests
      uses: dorny/test-reporter@v1
      if: always()
      with:
        name: Test Results
        path: backend/target/surefire-reports/*.xml
        reporter: java-junit

